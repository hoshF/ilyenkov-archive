name: Rights review or removal request
description: Request a rights correction, release review, attribution change, or removal.
title: "[Rights] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        The project reviews rights requests promptly. Do not publish private personal information or confidential evidence in the issue.
  - type: dropdown
    id: request
    attributes:
      label: Request type
      options:
        - Removal or temporary withdrawal
        - Rights status correction
        - Attribution correction
        - Request to review a file for public release
        - Other rights question
    validations:
      required: true
  - type: input
    id: path
    attributes:
      label: Exact repository path or public URL
    validations:
      required: true
  - type: textarea
    id: basis
    attributes:
      label: Rights basis and evidence
      description: State the relationship to the work and provide public evidence URLs where possible.
    validations:
      required: true
  - type: textarea
    id: action
    attributes:
      label: Requested action
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have not included confidential identity documents, private contact details, or secrets.
          required: true
